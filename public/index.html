<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pastelaria Maná</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<img src="logo.png" class="logo">
<h1>Pastelaria Maná</h1>
<p>Sabor que vem do Céu</p>
</header>

<section class="cardapio">

<h2>Pastel Tradicional - R$ 15</h2>

<label>1º Sabor</label>
<select id="sabor1">
<option>Carne</option>
<option>Frango</option>
<option>Queijo</option>
<option>Presunto</option>
<option>Bacon</option>
<option>Calabresa</option>
<option>Charque</option>
</select>

<label>2º Sabor</label>
<select id="sabor2">
<option>Não quero</option>
<option>Carne</option>
<option>Frango</option>
<option>Queijo</option>
<option>Presunto</option>
<option>Bacon</option>
<option>Calabresa</option>
<option>Charque</option>
</select>

<h2>Adicionais</h2>

<label><input type="checkbox" value="Queijo Extra" data-price="3"> Queijo Extra (+R$3)</label>
<label><input type="checkbox" value="Cheddar" data-price="3"> Cheddar (+R$3)</label>
<label><input type="checkbox" value="Bacon Extra" data-price="4"> Bacon Extra (+R$4)</label>
<label><input type="checkbox" value="Calabresa Extra" data-price="4"> Calabresa Extra (+R$4)</label>
<label><input type="checkbox" value="Catupiry" data-price="4"> Catupiry (+R$4)</label>
<label><input type="checkbox" value="Ovo" data-price="2"> Ovo (+R$2)</label>
<label><input type="checkbox" value="Quatro Queijos" data-price="5"> Quatro Queijos (+R$5)</label>
<h2>🍟 Batata Frita</h2>

<select id="batata">
  <option value="0">Não quero</option>
  <option value="8">Pequena - R$8</option>
  <option value="12">Média - R$12</option>
  <option value="16">Grande - R$16</option>
</select>

<h2>🥤 Bebidas</h2>

<select id="bebida">
  <option value="0">Não quero</option>
  <option value="6">Coca-Cola Lata - R$6</option>
  <option value="10">Coca-Cola 1L - R$10</option>
  <option value="6">Sukita Lata - R$6</option>
  <option value="6">Guaraná Lata - R$6</option>
  <option value="8">Suco Acerola 350ml - R$8</option>
  <option value="8">Suco Goiaba 350ml - R$8</option>
  <option value="8">Suco Maracujá 350ml - R$8</option>
</select>

<h2>🔥 Combos</h2>

<select id="combo">
  <option value="0">Nenhum Combo</option>
  <option value="18">Combo 1 - R$18</option>
  <option value="37">Combo Casal - R$37</option>
</select>
  
<h2>Bairro</h2>

<select id="bairro">
<option value="0">Jaderlândia</option>
<option value="0">Heliolândia</option>
<option value="0">Bom Jesus</option>
<option value="3">Milagre</option>
<option value="3">Santa Catarina</option>
<option value="4">Outros Próximos</option>
<option value="6">Outros Distantes</option>
</select>
<h2>👤 Dados do Cliente</h2>

<input id="nome" placeholder="Seu nome">

<input id="telefone" placeholder="Telefone">

<input id="rua" placeholder="Rua">

<input id="numero" placeholder="Número">

<input id="referencia" placeholder="Ponto de referência">

<h2>💳 Pagamento</h2>

<select id="pagamento">
  <option>Pix</option>
  <option>Dinheiro</option>
</select>

<input id="troco" placeholder="Troco para quanto? (se dinheiro)">

<button onclick="finalizarPedido()">
Fazer Pedido
</button>

</section>

<script src="app.js"></script>
</body>
</html>
